version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tdm-api
    user: "${UID}:${GID}"
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - tdm-network

  nginx:
    image: nginx:alpine
    container_name: tdm-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tdm-network

  db:
    image: mariadb:11
    container_name: tdm-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tdm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: tdm
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - tdm-network

  redis:
    image: redis:alpine
    container_name: tdm-redis
    ports:
      - "6379:6379"
    networks:
      - tdm-network

networks:
  tdm-network:

volumes:
  dbdata:
