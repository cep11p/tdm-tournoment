services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        TZ: ${APP_TIMEZONE:-America/Argentina/Buenos_Aires}
    container_name: tdm-api
    user: "${UID}:${GID}"
    working_dir: /var/www/html
    environment:
      TZ: ${APP_TIMEZONE:-America/Argentina/Buenos_Aires}
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/conf.d/99-timezone.ini:/usr/local/etc/php/conf.d/99-timezone.ini:ro
    depends_on:
      db:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - tdm-network

  nginx:
    image: nginx:alpine
    container_name: tdm-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tdm-network

  db:
    image: mariadb:11
    container_name: tdm-db
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-America/Argentina/Buenos_Aires}
      MYSQL_DATABASE: tdm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: tdm
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mariadb/conf.d:/etc/mysql/mariadb.conf.d:ro
    networks:
      - tdm-network

  redis:
    image: redis:alpine
    container_name: tdm-redis
    ports:
      - "6379:6379"
    networks:
      - tdm-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.8
    container_name: tdm-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - tdm-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/tdm/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    image: node:22-alpine
    container_name: tdm-front
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - tdm-network

networks:
  tdm-network:

volumes:
  dbdata:
  keycloak_data:
